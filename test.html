<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12 Button Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .button:active {
            transform: translateY(-1px);
        }

        @media (max-width: 600px) {
            .button-grid {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Quick Links</h1>
        <div class="button-grid">
            <a href="https://drive.google.com/file/d/14Ay1NayrKiT2thszHcjWvCOgFBgAwskY/view" class="button">EP 1</a>
            <a href="https://drive.google.com/file/d/132xsrGHmYSCQXfy2dcfbwKxFJxkf6fGu/view" class="button">EP 2</a>
            <a href="https://drive.google.com/file/d/14k7t5zPA9slnQzGPgPvGBLp165JEEU5s/view" class="button">EP 3</a>
            <a href="https://drive.google.com/file/d/1ryNFCwM9XKgPYAz180a4wEH80BuO25Td/view" class="button">EP 4</a>
            <a href="https://drive.google.com/file/d/18wbNvIm3Ukx_aHOClYG0_LqPophXzLIH/view" class="button">EP 5</a>
            <a href="https://drive.google.com/file/d/1sqxcd606nwOJZSs7eVeJGRzZARRLFtcU/view" class="button">EP 6</a>
            <a href="https://drive.google.com/file/d/1zrKCHvstuM9Zakh_Nk7L9dvjarH44Gvr/view" class="button">EP 7</a>
            <a href="https://drive.google.com/file/d/1zWW7I21GtnHquUfjlWrnZ2xZAdhCLeeC/view" class="button">EP 8</a>

        </div>
    </div>
</body>
</html>
